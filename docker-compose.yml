services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - neuron-network
    # If you have an NVIDIA GPU, uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # One-shot: waits for Ollama, pulls models from models.txt, then exits. Models persist in ollama_data.
  ollama-init:
    image: curlimages/curl:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_started
    restart: "no"
    volumes:
      - ./models.txt:/models.txt:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama..."
        until curl -sf http://ollama:11434/api/tags >/dev/null; do sleep 2; done;
        echo "Pulling models from models.txt..."
        while IFS= read -r model || [ -n "$$model" ]; do
          model="$${model%%#*}"  # strip inline comments
          [ -z "$$model" ] && continue
          echo "Pulling $$model..."
          curl -s -X POST http://ollama:11434/api/pull -H "Content-Type: application/json" -d "{\"model\":\"$$model\",\"stream\":false}"
        done < /models.txt
        echo "Models ready."
    networks:
      - neuron-network

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - STATIC_DIR=/app/backend/static
    volumes:
      - open_webui_data:/app/backend/data
      - ./open-webui-static:/app/backend/static
    depends_on:
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    networks:
      - neuron-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_DIAGNOSTICS_ENABLED=${N8N_DIAGNOSTICS_ENABLED:-false}
      - N8N_VERSION_NOTIFICATIONS_ENABLED=${N8N_VERSION_NOTIFICATIONS_ENABLED:-false}
      - N8N_TEMPLATES_ENABLED=${N8N_TEMPLATES_ENABLED:-false}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - TZ=${TIMEZONE}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - ollama
    networks:
      - neuron-network

  agent-platform:
    build:
      context: .
      dockerfile: dockerfile
    container_name: agent-platform
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - OLLAMA_URL=http://ollama:11434
      - OPEN_WEBUI_URL=http://open-webui:8080
      - N8N_URL=http://n8n:5678
      - QDRANT_URL=http://qdrant:6333
      - API_TOKEN=${API_TOKEN}
    volumes:
      - .:/app
    depends_on:
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
      n8n:
        condition: service_started
      open-webui:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - neuron-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - neuron-network

volumes:
  ollama_data:
  open_webui_data:
  n8n_data:
  qdrant_data:

networks:
  neuron-network:
    driver: bridge